<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page">
    <form id="settings-form" class="settings-form" novalidate>
      <h1>Settings</h1>

      <div class="field">
        <label for="name">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          aria-describedby="name-error"
        >
        <span id="name-error" class="error" role="alert"></span>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input
          type="text"
          id="email"
          name="email"
          aria-describedby="email-error"
        >
        <span id="email-error" class="error" role="alert"></span>
      </div>

      <fieldset class="field">
        <legend>Notification preference</legend>

        <div class="radio-option">
          <input type="radio" id="notify-all" name="notification" value="All" checked>
          <label for="notify-all">All</label>
        </div>

        <div class="radio-option">
          <input type="radio" id="notify-important" name="notification" value="Important only">
          <label for="notify-important">Important only</label>
        </div>

        <div class="radio-option">
          <input type="radio" id="notify-none" name="notification" value="None">
          <label for="notify-none">None</label>
        </div>

        <span id="notification-error" class="error" role="alert"></span>
      </fieldset>

      <div class="actions">
        <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
        <button type="submit" id="submit-btn" class="btn btn-primary">Save changes</button>
      </div>

      <p id="save-status" class="save-status" role="status"></p>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
